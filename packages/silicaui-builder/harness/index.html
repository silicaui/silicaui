<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@wizeworks/silicaui-builder — live harness</title>
    <style>
      /* Host frame only — proves the builder EMBEDS (fills its container) rather
         than assuming the viewport. All builder styling is Tailwind + @wizeworks/silicaui. */
      html, body { margin: 0; height: 100%; background: #dfe2e8; }
      #host { position: absolute; inset: 24px; border-radius: 14px; overflow: hidden;
        box-shadow: 0 20px 60px rgba(20, 20, 40, 0.18); background: #fff; }
      #app { height: 100%; }
    </style>
  </head>
  <body>
    <div id="host"><div id="app"></div></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
