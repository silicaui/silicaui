# silicaui's own namespace — self-contained, the way kanNINJA's workloads live
# in `kanninja`. Nothing here reaches into sparx-prod except (optionally) the
# single Caddy host block, which lives in sparx's config, not here.
apiVersion: v1
kind: Namespace
metadata:
  name: silicaui
  labels:
    app.kubernetes.io/name: silicaui-site
