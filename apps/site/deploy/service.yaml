# ClusterIP, exactly like kanNINJA's services — reachable inside the cluster on
# :80, never directly from the internet. Whatever fronts it (the shared Caddy,
# or a GKE Ingress) proxies to this Service by its DNS name:
#   site.silicaui.svc.cluster.local:80
apiVersion: v1
kind: Service
metadata:
  name: site
  namespace: silicaui
  labels:
    app.kubernetes.io/name: silicaui-site
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: silicaui-site
  ports:
    - name: http
      port: 80
      targetPort: 8080
