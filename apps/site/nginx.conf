# Serves the Next.js static export (`output: "export"`, `trailingSlash: true`).
#
# With trailing slashes on, every route is emitted as a directory carrying an
# `index.html` (e.g. `/docs/components/button/index.html`), plus a top-level
# `404.html`. `try_files … $uri/ …` resolves the directory to its index; the
# `$uri.html` fallback covers any non-slashed asset path. Nothing here is
# SPA-style client routing — every path is a real prerendered file, which is
# the whole point of the static export (crawlers see real HTML).
server {
  listen       8080;
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # Hashed build assets are content-addressed and safe to cache forever.
  location /_next/static/ {
    expires    1y;
    add_header Cache-Control "public, immutable";
  }

  # Everything else: try the exact file, then the directory index, then a
  # `.html` sibling, else fall through to the real 404 page.
  location / {
    try_files $uri $uri/ $uri.html =404;
  }

  error_page 404 /404.html;
}
