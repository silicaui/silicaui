name: Deploy site

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Separate group from `release.yml` / `ci.yml` — a site build failure must
# never block npm publishing, and vice versa.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The site imports built entry points (`@wizeworks/silicaui-demos/meta`),
      # and every package `dist/` is gitignored — so a clean checkout has to
      # build the workspace before Next can resolve them.
      - name: Build packages
        run: pnpm build

      - name: Build site
        run: pnpm site:build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/site/out

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
