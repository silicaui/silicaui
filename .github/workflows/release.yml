name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Create Release Pull Request or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # guard-version runs first so a runaway/wrong bump type can never reach
          # `npm publish` — it only opens the Version PR, which still needs review.
          publish: node scripts/guard-version.mjs && pnpm release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # changesets/action's own `npm publish` calls check for NPM_TOKEN by that
          # exact name — NODE_AUTH_TOKEN alone makes it fall back to OIDC trusted
          # publishing, which has no trust relationship for a package that was
          # ever fully unpublished. Set both so npm CLI auth works either way.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
