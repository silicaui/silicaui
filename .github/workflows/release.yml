name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # changesets/action's own `publish:` input silently swallows both output
      # and the actual `npm publish` calls (confirmed: running the same command
      # as a plain step works fine, wrapped through `publish:` it no-ops with
      # no error). So publish is its own explicit step here instead, gated on
      # the action's own `hasChangesets` output — it only runs once the Version
      # PR has been merged and there's nothing left to version.
      - name: Publish to npm
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: node scripts/guard-version.mjs && pnpm release
        env:
          # changesets/cli's own npm publish calls check for NPM_TOKEN by that
          # exact name — NODE_AUTH_TOKEN alone makes it fall back to OIDC
          # trusted publishing, which has no trust relationship for a scope
          # that has never published before. Set both so npm CLI auth works.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
