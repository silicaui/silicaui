name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      # Every package's own probe suite plus the byte-identical HTML golden.
      # These existed for a while but nothing ran them in CI, so a regression
      # they were written to catch could still land on main.
      - name: Verify
        run: pnpm verify

      - name: Typecheck
        run: pnpm typecheck

      # Correctness-only lint. Also runs the RuleTester for the local
      # no-dom-in-state-initializer rule, which catches the SSR hydration bug
      # class that eslint-plugin-ssr-friendly structurally cannot see.
      - name: Lint
        run: pnpm lint

  site:
    name: Build site (smoke test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The site imports built entry points (`@wizeworks/silicaui-demos/meta`),
      # and every package `dist/` is gitignored — so a clean checkout has to
      # build the workspace before Next can resolve them.
      - name: Build packages
        run: pnpm build

      - name: Build site
        run: pnpm site:build
